server:
  port: 8080

app:
  ai:
    sync-timeout-ms: ${AI_SYNC_TIMEOUT_MS:120000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  prompts:
    directory: ${PROMPT_DIR:prompts}
  settings:
    file: ${SETTINGS_FILE:}
  openrouter:
    proxy: ${OPENROUTER_PROXY:}
  smart-embedding:
    endpoint: ${SMART_EMBEDDING_ENDPOINT:http://127.0.0.1:8765/embed}

spring:
  ai:
    openai:
      api-key: ${ZHIPU_API_KEY:not-configured}
      base-url: https://open.bigmodel.cn
      chat:
        completions-path: /api/paas/v4/chat/completions
        options:
          model: glm-4-flash
          temperature: 0.7

logging:
  level:
    org.springframework.ai.chat.model.MessageAggregator: OFF
